# Dependabot keeps dependencies patched and opens PRs for security advisories.
# https://docs.github.com/code-security/dependabot
version: 2
updates:
  # npm dependencies (Next.js, React, GSAP, tooling)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    groups:
      # Bundle routine non-major bumps into one PR to cut noise; security
      # advisories still come through as their own PRs regardless.
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions (for any future CI workflows)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
